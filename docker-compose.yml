services:
  floating-posters:
    image: ghcr.io/TechJedi51/floating-posters:latest
    volumes:
      - /path/to/source:/input      # folder containing .mov/.mp4 + .yaml pairs
      - /path/to/output:/output     # finished videos are written here
    environment:
      # ── Required ──────────────────────────────────────────────
      - RADARR_URL=http://10.0.216.15:7878
      - RADARR_API_KEY=${RADARR_API_KEY}
      - SONARR_URL=http://10.0.216.15:8989     # required only if using tv: yaml files
      - SONARR_API_KEY=${SONARR_API_KEY}

      # ── CPU & quality ──────────────────────────────────────────
      - CPU_THREADS=2
      - VIDEO_CRF=18
      - VIDEO_PRESET=fast

    restart: "no"
    deploy:
      resources:
        limits:
          cpus: "2.0"
