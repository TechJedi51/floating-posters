services:
  floating-posters:
    image: ghcr.io/TechJedi51/floating-posters:latest
    volumes:
      - /path/to/source:/input      # folder containing .mov/.mp4 + .yaml pairs

      # ── Output — choose ONE of the options below ───────────────
      #
      # Option A: Standalone (no NeXroll)
      # Map a host folder to the default /output path.
      # Set OUTPUT_DIR only if you want a subfolder inside the volume.
      - /path/to/output:/output
      #
      # Option B: NeXroll shared volume
      # Mount the same named volume NeXroll uses. Set OUTPUT_DIR to
      # point at the Pre-Rolls subfolder and set NEXROLL_OUTPUT_PATH
      # to the same path so NeXroll can find the files for registration.
      # Comment out Option A and uncomment the block below:
      #
      # - type: volume
      #   source: plexserver_nexroll
      #   target: /nexroll_media
      #   volume:
      #     nocopy: true
      # environment:
      #   - OUTPUT_DIR=/nexroll_media/Pre-Rolls
      #   - NEXROLL_OUTPUT_PATH=/nexroll_media/Pre-Rolls

    environment:
      # ── Required ──────────────────────────────────────────────
      - RADARR_URL=http://your-radarr:7878
      - RADARR_API_KEY=${RADARR_API_KEY}
      - SONARR_URL=http://your-sonarr:8989
      - SONARR_API_KEY=${SONARR_API_KEY}

      # ── NeXroll (optional — enables preroll registration) ──────
      - NEXROLL_URL=http://your-nexroll:9393
      - NEXROLL_API_KEY=${NEXROLL_API_KEY}
      # See volume options above for NEXROLL_OUTPUT_PATH guidance

      # ── Scheduler ─────────────────────────────────────────────
      # Leave unset (or remove) to run once and exit.
      # Set to run on a repeating schedule — container stays running.
      # Examples: 6h  12h  24h  1d  30m
      - RERUN_INTERVAL=24h

      # ── CPU & quality ──────────────────────────────────────────
      - CPU_THREADS=2
      - VIDEO_CRF=18
      - VIDEO_PRESET=fast

    restart: unless-stopped    # keep container alive between runs
    deploy:
      resources:
        limits:
          cpus: "2.0"
